# Use this instead of ingress.yaml when running on k3s (EC2),
# since k3s ships with Traefik as its default ingress controller — no separate install needed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app-ingress
spec:
  ingressClassName: traefik
  rules:
    - http:                # no host restriction -> reachable via the EC2 public IP directly
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app-service
                port:
                  number: 80
